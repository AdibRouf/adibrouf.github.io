<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adib's Portfolio</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const ChevronLeft = ({ className }) => (
      <svg className={className} fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
        <path d="M15 19l-7-7 7-7"></path>
      </svg>
    );
    const ChevronRight = ({ className }) => (
      <svg className={className} fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
        <path d="M9 5l7 7-7 7"></path>
      </svg>
    );
    const ExternalLink = ({ className }) => (
      <svg className={className} fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"></path>
      </svg>
    );

    function Portfolio() {
      const [bootPhase, setBootPhase] = React.useState('idle'); 
      // phases: idle → powering → glowing → booting → done
      const [initiated, setInitiated] = React.useState(false);
      const [typedText, setTypedText] = React.useState('');
      const [currentProject, setCurrentProject] = React.useState(0);
      const [isAnimating, setIsAnimating] = React.useState(false);
      const [slideDir, setSlideDir] = React.useState(null); // 'left' | 'right' | null
      const [currentPortrait, setCurrentPortrait] = React.useState(0);

      const fullText = "Hi! I'm Adib Rouf, a student developing the tools of tomorrow.";

      const portraits = [
        "portraits/portrait1.png",
        "portraits/portrait2.png",
        "portraits/portrait3.png",
        "portraits/portrait4.png"
      ];

      const projects = [
        {
          title: "XAI for Autonomous Vehicles",
          description: "Real-time AI Explanations for self-driving cars",
          tags: ["Artificial Intelligence", "Python", "HTML", "CSS", "React"],
          gradient: "from-slate-400 to-zinc-300",
          url: "https://chefbaker4.github.io/AV-Saliency-Explainer/",
          image: "images/xai.png"
        },
        {
          title: "Pod Insights Platform",
          description: "A Unique Data-Aggregation Platform",
          tags: ["Python", "SQL", "Snowflake"],
          gradient: "from-zinc-300 to-slate-400"
        },
        {
          title: "MRR Radar",
          description: "WIP: Data as a Service Platform",
          tags: ["AI", "Data Scraping", "Automation"],
          gradient: "from-slate-300 to-gray-400"
        },
        {
          title: "Social Bored",
          description: "WIP: The Future of Meeting People Online",
          tags: ["Full Stack", "React", "Node.js"],
          gradient: "from-gray-400 to-zinc-300"
        }
      ];

      // Auto-start boot sequence on mount
      React.useEffect(() => {
        const t1 = setTimeout(() => setBootPhase('powering'), 600);
        const t2 = setTimeout(() => setBootPhase('glowing'), 1800);
        const t3 = setTimeout(() => setBootPhase('booting'), 2800);
        const t4 = setTimeout(() => {
          setBootPhase('done');
          setInitiated(true);
        }, 4200);
        return () => [t1,t2,t3,t4].forEach(clearTimeout);
      }, []);

      // Typing effect
      React.useEffect(() => {
        if (initiated && typedText.length < fullText.length) {
          const t = setTimeout(() => setTypedText(fullText.slice(0, typedText.length + 1)), 60);
          return () => clearTimeout(t);
        }
      }, [typedText, initiated]);

      // Portrait rotation
      React.useEffect(() => {
        if (!initiated) return;
        const interval = setInterval(() => setCurrentPortrait(p => (p + 1) % portraits.length), 3000);
        return () => clearInterval(interval);
      }, [initiated]);

      const goToProject = (nextIdx, direction) => {
        if (isAnimating) return;
        setIsAnimating(true);
        setSlideDir(direction);
        setTimeout(() => {
          setCurrentProject(nextIdx);
          setSlideDir(direction === 'left' ? 'in-right' : 'in-left');
          setTimeout(() => {
            setSlideDir(null);
            setIsAnimating(false);
          }, 450);
        }, 350);
      };

      const nextProject = () => goToProject((currentProject + 1) % projects.length, 'left');
      const prevProject = () => goToProject((currentProject - 1 + projects.length) % projects.length, 'right');
      const jumpToProject = (idx) => {
        if (idx === currentProject || isAnimating) return;
        goToProject(idx, idx > currentProject ? 'left' : 'right');
      };

      const slideClass = {
        left: 'slide-out-left',
        right: 'slide-out-right',
        'in-right': 'slide-in-right',
        'in-left': 'slide-in-left',
      }[slideDir] || '';

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 via-slate-100 to-zinc-100">
          <style>{`
            /* ── Boot animation styles ── */
            .boot-overlay {
              position: fixed; inset: 0; z-index: 50;
              background: linear-gradient(135deg, #f8fafc, #e2e8f0, #f1f5f9);
              display: flex; align-items: center; justify-content: center;
              transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.4,0,0.2,1);
            }
            .boot-overlay.exit {
              opacity: 0;
              transform: scale(1.04);
              pointer-events: none;
            }

            /* Power button ring */
            .power-ring {
              position: relative;
              width: 160px; height: 160px;
              display: flex; align-items: center; justify-content: center;
            }
            .power-ring svg.ring-svg {
              position: absolute; inset: 0; width: 100%; height: 100%;
              transform: rotate(-90deg);
            }
            .ring-track {
              fill: none;
              stroke: #cbd5e1;
              stroke-width: 3;
            }
            .ring-progress {
              fill: none;
              stroke: #22c55e;
              stroke-width: 3;
              stroke-linecap: round;
              stroke-dasharray: 408;
              stroke-dashoffset: 408;
              transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1),
                          stroke 0.4s ease;
            }
            .ring-progress.charging {
              stroke-dashoffset: 0;
            }
            .power-btn-inner {
              width: 110px; height: 110px;
              border-radius: 50%;
              background: #ffffff;
              border: 2.5px solid #cbd5e1;
              display: flex; align-items: center; justify-content: center;
              transition: border-color 0.6s ease, box-shadow 0.6s ease, background 0.6s ease;
              position: relative; z-index: 2;
            }
            .power-btn-inner.glowing {
              border-color: #22c55e;
              box-shadow: 0 0 0 6px rgba(34,197,94,0.12), 0 0 32px rgba(34,197,94,0.2);
              background: #f0fdf4;
            }
            .power-icon {
              transition: color 0.8s ease, filter 0.8s ease;
              color: #94a3b8;
            }
            .power-icon.on {
              color: #16a34a;
              filter: drop-shadow(0 0 6px rgba(34,197,94,0.5));
            }
            .boot-label {
              position: absolute; bottom: -48px; left: 50%;
              transform: translateX(-50%);
              white-space: nowrap;
              font-size: 12px; letter-spacing: 0.18em;
              color: #94a3b8;
              transition: color 0.6s ease, opacity 0.6s ease;
            }
            .boot-label.active { color: #22c55e; }

            /* Ripple expand on boot done */
            @keyframes rippleOut {
              0% { transform: scale(1); opacity: 0.5; }
              100% { transform: scale(8); opacity: 0; }
            }
            .ripple {
              position: absolute;
              width: 160px; height: 160px;
              border-radius: 50%;
              border: 2px solid #22c55e;
              animation: rippleOut 0.9s ease-out forwards;
            }

            /* ── Project card slide transitions ── */
            .project-card-wrap {
              overflow: hidden;
              border-radius: 1rem;
            }
            .project-card {
              transition: transform 0.35s cubic-bezier(0.4,0,0.2,1),
                          opacity 0.35s ease;
              will-change: transform, opacity;
            }
            .project-card.slide-out-left {
              transform: translateX(-60px);
              opacity: 0;
            }
            .project-card.slide-out-right {
              transform: translateX(60px);
              opacity: 0;
            }
            .project-card.slide-in-right {
              animation: slideInFromRight 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
            }
            .project-card.slide-in-left {
              animation: slideInFromLeft 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
            }
            @keyframes slideInFromRight {
              from { transform: translateX(60px); opacity: 0; }
              to   { transform: translateX(0);    opacity: 1; }
            }
            @keyframes slideInFromLeft {
              from { transform: translateX(-60px); opacity: 0; }
              to   { transform: translateX(0);     opacity: 1; }
            }

            /* Keyboard hint */
            .kbd {
              display: inline-block;
              padding: 2px 6px;
              font-size: 11px;
              border: 1px solid #cbd5e1;
              border-radius: 4px;
              color: #94a3b8;
              background: #f8fafc;
            }
          `}</style>

          {/* ── Boot Screen ── */}
          {bootPhase !== 'done' && (
            <div className={`boot-overlay ${bootPhase === 'booting' ? 'exit' : ''}`}>
              <div className="power-ring">
                {/* Ripple on glowing phase */}
                {bootPhase === 'glowing' && <div className="ripple" style={{ animationDelay: '0.1s' }} />}
                {bootPhase === 'glowing' && <div className="ripple" style={{ animationDelay: '0.35s' }} />}

                {/* SVG ring progress */}
                <svg className="ring-svg" viewBox="0 0 160 160">
                  <circle className="ring-track" cx="80" cy="80" r="65" />
                  <circle
                    className={`ring-progress ${bootPhase === 'powering' || bootPhase === 'glowing' || bootPhase === 'booting' ? 'charging' : ''}`}
                    cx="80" cy="80" r="65"
                  />
                </svg>

                {/* Inner circle with power icon */}
                <div className={`power-btn-inner ${bootPhase === 'glowing' || bootPhase === 'booting' ? 'glowing' : ''}`}>
                  <svg
                    className={`power-icon ${bootPhase === 'glowing' || bootPhase === 'booting' ? 'on' : ''}`}
                    width="44" height="44"
                    fill="none" strokeLinecap="round" strokeLinejoin="round"
                    strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor"
                  >
                    <path d="M18.36 6.64a9 9 0 11-12.73 0M12 2v10"></path>
                  </svg>
                </div>

                <div className={`boot-label ${bootPhase === 'powering' ? 'active' : ''} ${bootPhase === 'glowing' || bootPhase === 'booting' ? 'active' : ''}`}>
                  {bootPhase === 'idle'    && 'STANDBY'}
                  {bootPhase === 'powering' && 'INITIALIZING'}
                  {bootPhase === 'glowing'  && 'SYSTEM ONLINE'}
                  {bootPhase === 'booting'  && 'LOADING'}
                </div>
              </div>
            </div>
          )}

          {/* ── Main Content ── */}
          {initiated && (
            <>
              {/* Hero */}
              <section className="h-screen flex items-center justify-center relative overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-white/60 via-slate-100/40 to-transparent"></div>
                <div className="absolute top-20 right-20 w-96 h-96 bg-gradient-radial from-slate-200/30 to-transparent rounded-full blur-3xl"></div>
                <div className="absolute bottom-20 left-20 w-96 h-96 bg-gradient-radial from-zinc-200/30 to-transparent rounded-full blur-3xl"></div>
                <div className="relative z-10 text-center px-4 max-w-4xl">
                  <h1 className="text-6xl md:text-7xl font-light mb-8 text-slate-800 tracking-tight min-h-[88px]">
                    {typedText}
                    {typedText.length < fullText.length && (
                      <span className="inline-block w-1 h-14 bg-slate-400 ml-1 animate-pulse align-middle"></span>
                    )}
                  </h1>
                  <div className="w-32 h-px bg-gradient-to-r from-transparent via-slate-400 to-transparent mx-auto mb-8"></div>
                  <p className="text-xl text-slate-600 font-light tracking-wide mb-12">
                    Innovation • Design • Excellence
                  </p>
                  <div className="flex flex-col items-center gap-2 animate-bounce">
                    <p className="text-sm text-slate-500 font-light tracking-wide">Scroll to explore</p>
                    <svg className="w-6 h-6 text-slate-400" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
                      <path d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                    </svg>
                  </div>
                </div>
              </section>

              {/* About */}
              <section className="min-h-screen flex items-center justify-center py-20 px-4 relative">
                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-white/60 to-transparent"></div>
                <div className="relative z-10 max-w-6xl w-full">
                  <h2 className="text-5xl font-light text-slate-800 mb-16 text-center tracking-tight">Professional Overview</h2>
                  <div className="flex flex-col md:flex-row items-center gap-12 bg-white/70 backdrop-blur-sm rounded-2xl shadow-2xl p-8 md:p-12 border border-slate-200/50">
                    <div className="flex-shrink-0">
                      <div className="relative w-56 h-56 md:w-64 md:h-64 rounded-full overflow-hidden border-4 border-slate-200 shadow-xl">
                        {portraits.map((portrait, idx) => (
                          <img key={idx} src={portrait} alt={`Portrait ${idx + 1}`}
                            className="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000"
                            style={{ opacity: idx === currentPortrait ? 1 : 0 }}
                          />
                        ))}
                        <div className="absolute inset-0 bg-gradient-to-br from-transparent via-white/10 to-transparent pointer-events-none"></div>
                      </div>
                    </div>
                    <div className="flex-1">
                      <h3 className="text-3xl font-light text-slate-800 mb-6 tracking-tight">About Me</h3>
                      <p className="text-lg text-slate-600 font-light leading-relaxed mb-4">
                        I'm a Computer Science student at the University of Connecticut specializing in Artificial Intelligence, with a passion for building intelligent systems that transform raw data into actionable insights. My work spans full-stack development, machine learning workflows, and data engineering—always with a focus on creating scalable, efficient solutions.
                      </p>
                      <p className="text-lg text-slate-600 font-light leading-relaxed mb-4">
                        Currently, I'm working as an Undergraduate Research Intern where I architect full-stack applications that streamline language model development. From designing React interfaces to optimizing data pipelines with UConn's High-Performance Computing units, I thrive at the intersection of AI, data processing, and user-centric design.
                      </p>
                      <p className="text-lg text-slate-600 font-light leading-relaxed">
                        Whether I'm automating the processing of thousands of XML documents, building explainable AI systems for autonomous vehicles, or engineering prompts to revolutionize content production workflows—I'm driven by the challenge of uncovering patterns in data and turning complex problems into elegant, automated solutions.
                      </p>
                    </div>
                  </div>
                </div>
              </section>

              {/* Projects */}
              <section className="min-h-screen flex items-center justify-center py-20 px-4 relative">
                <div className="absolute inset-0 bg-gradient-to-t from-white/80 to-transparent"></div>
                <div className="relative z-10 max-w-4xl w-full">
                  <h2 className="text-5xl font-light text-slate-800 mb-4 text-center tracking-tight">Featured Work</h2>
                  <p className="text-center text-slate-500 font-light mb-12 text-sm tracking-wide">
                    <span className="kbd">←</span> <span className="kbd">→</span> to navigate
                  </p>

                  <div className="project-card-wrap bg-white/70 backdrop-blur-sm shadow-2xl border border-slate-200/50">
                    <div className={`project-card ${slideClass}`}>
                      {/* Image / preview */}
                      <div
                        className={`h-56 md:h-72 bg-gradient-to-br ${projects[currentProject].gradient} relative overflow-hidden ${projects[currentProject].url ? 'cursor-pointer group' : ''}`}
                        onClick={() => projects[currentProject].url && window.open(projects[currentProject].url, '_blank')}
                      >
                        {projects[currentProject].image && (
                          <img src={projects[currentProject].image} alt={projects[currentProject].title}
                            className="absolute inset-0 w-full h-full object-cover"
                          />
                        )}
                        {/* Hover overlay for clickable projects */}
                        {projects[currentProject].url && (
                          <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors duration-300 flex items-center justify-center">
                            <div className="opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-white/90 backdrop-blur-sm rounded-full px-5 py-2.5 flex items-center gap-2 text-slate-700 font-light text-sm shadow-lg">
                              <ExternalLink className="w-4 h-4" />
                              View Project
                            </div>
                          </div>
                        )}
                      </div>

                      {/* Card body */}
                      <div className="p-8 md:p-12">
                        <div className="flex items-start justify-between mb-3">
                          <h3 className="text-3xl md:text-4xl font-light text-slate-800 tracking-tight leading-tight">
                            {projects[currentProject].title}
                          </h3>
                          <span className="text-slate-400 font-light text-lg ml-4 mt-1 flex-shrink-0">
                            {String(currentProject + 1).padStart(2,'0')}/{String(projects.length).padStart(2,'0')}
                          </span>
                        </div>
                        <p className="text-lg text-slate-600 mb-6 font-light leading-relaxed">
                          {projects[currentProject].description}
                        </p>
                        <div className="flex gap-2 flex-wrap">
                          {projects[currentProject].tags.map((tag, idx) => (
                            <span key={idx} className="px-4 py-1.5 bg-slate-100 text-slate-700 rounded-full text-sm font-light border border-slate-200">
                              {tag}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Nav bar */}
                    <div className="flex items-center justify-between px-8 md:px-12 py-5 border-t border-slate-100">
                      <button onClick={prevProject} disabled={isAnimating}
                        className="flex items-center gap-2 text-slate-600 hover:text-slate-800 transition-colors duration-200 text-sm font-light disabled:opacity-40"
                      >
                        <ChevronLeft className="w-5 h-5" /> Prev
                      </button>

                      <div className="flex gap-2 items-center">
                        {projects.map((_, idx) => (
                          <button key={idx} onClick={() => jumpToProject(idx)}
                            className={`h-2 rounded-full transition-all duration-300 ${
                              idx === currentProject ? 'w-8 bg-slate-500' : 'w-2 bg-slate-300 hover:bg-slate-400'
                            }`}
                          />
                        ))}
                      </div>

                      <button onClick={nextProject} disabled={isAnimating}
                        className="flex items-center gap-2 text-slate-600 hover:text-slate-800 transition-colors duration-200 text-sm font-light disabled:opacity-40"
                      >
                        Next <ChevronRight className="w-5 h-5" />
                      </button>
                    </div>
                  </div>
                </div>
              </section>
            </>
          )}
        </div>
      );
    }

    // Keyboard navigation support
    function App() {
      const portfolioRef = React.useRef(null);

      React.useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight') document.dispatchEvent(new CustomEvent('projectNext'));
          if (e.key === 'ArrowLeft')  document.dispatchEvent(new CustomEvent('projectPrev'));
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      return <Portfolio />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script type="text/babel">
    // Arrow key wiring — attach after mount
    (function() {
      document.addEventListener('projectNext', () => {
        const btn = document.querySelector('[data-next]');
        if (btn) btn.click();
      });
      document.addEventListener('projectPrev', () => {
        const btn = document.querySelector('[data-prev]');
        if (btn) btn.click();
      });
    })();
  </script>
</body>
</html>
